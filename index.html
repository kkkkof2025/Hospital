<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>采血管的缤纷之旅</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="countdown-overlay" class="countdown-overlay hidden">3</div>

      <section id="start-screen" class="screen active lab">
        <div class="lab-header">
          <div class="title-group">
            <p class="title-eyebrow">检验医学游戏设计方案</p>
            <h1>采血管的缤纷之旅</h1>
            <p class="subtitle">30秒记住彩虹密码，守护检验质量</p>
          </div>
          <button id="start-btn" class="primary-btn">进入记忆挑战</button>
        </div>

        <div class="lab-stage">
          <div class="tube-shelf">
            <div class="mini-tube purple"></div>
            <div class="mini-tube blue"></div>
            <div class="mini-tube black"></div>
            <div class="mini-tube red"></div>
            <div class="mini-tube yellow"></div>
            <div class="mini-tube green"></div>
          </div>

          <div class="character">
            <div class="microscope"></div>
            <div class="head">
              <div class="hair"></div>
              <div class="face">
                <span class="eye left"></span>
                <span class="eye right"></span>
                <span class="smile"></span>
              </div>
            </div>
            <div class="body">
              <div class="arm left"></div>
              <div class="arm right"></div>
            </div>
          </div>

          <div class="dialogue">
            <p class="name">赛斯（挥手，眨眨眼）：</p>
            <p>“嗨！我是赛斯，实验室的样本采集员！别小看这些五颜六色的管子哦，每一种颜色，都藏着一个身体的小秘密。”</p>
            <p>镜头拉近：赛斯拿起一支紫色管，里面浮现出红细胞、白细胞的卡通形象在游动。</p>
            <p class="focus">“接下来，你有 30 秒的时间，记住这些彩虹密码！准备好了吗？”</p>
          </div>
        </div>
      </section>

      <section id="memory-screen" class="screen lab">
        <div class="hud">
          <div class="timer">
            <div class="timer-bar">
              <div id="memory-bar" class="timer-fill"></div>
            </div>
            <span id="memory-time" class="timer-text">30</span>
          </div>
          <div class="hud-title">记忆卡片倒计时</div>
        </div>

        <div class="memory-area">
          <div id="memory-card" class="memory-card">
            <div class="memory-color">紫色管</div>
            <div class="memory-project">血常规检查</div>
            <div class="memory-icon" id="memory-icon"></div>
          </div>
          <p class="memory-tip">每张卡片停留 2 秒，注意颜色 + 项目 + 图标</p>
        </div>
      </section>

      <section id="game-screen" class="screen lab">
        <div class="hud">
          <div class="timer">
            <div class="timer-bar">
              <div id="game-bar" class="timer-fill"></div>
            </div>
            <span id="game-time" class="timer-text">30</span>
          </div>
          <div class="hud-score">得分：<span id="score">0</span></div>
        </div>

        <div id="game-area" class="game-area">
          <div class="lab-machines">
            <div class="centrifuge">
              <div class="disc"></div>
            </div>
            <div class="microscope-stand"></div>
          </div>

          <div id="fall-area" class="fall-area"></div>

          <div class="tube-row" id="tube-row">
            <div class="tube" data-color="purple">
              <div class="tube-label">紫色管</div>
            </div>
            <div class="tube" data-color="blue">
              <div class="tube-label">蓝色管</div>
            </div>
            <div class="tube" data-color="black">
              <div class="tube-label">黑色管</div>
            </div>
            <div class="tube" data-color="red">
              <div class="tube-label">红色管</div>
            </div>
            <div class="tube" data-color="yellow">
              <div class="tube-label">黄色管</div>
            </div>
            <div class="tube" data-color="green">
              <div class="tube-label">绿色管</div>
            </div>
          </div>
        </div>
      </section>

      <section id="end-screen" class="screen lab">
        <div class="result-card">
          <h2>时间到！</h2>
          <p class="result-score">最终得分：<span id="final-score">0</span></p>
          <p id="evaluation" class="result-eval">评价</p>
          <div class="result-actions">
            <button id="restart-btn" class="primary-btn">再来一次</button>
            <button id="back-btn" class="ghost-btn">返回开始</button>
          </div>
        </div>
      </section>
    </div>

    <script src="game.js"></script>

  </body>
</html>
